apiVersion: v1
kind: Pod
metadata:
  name: registry
  namespace: kube-system
spec:
  containers:
    - name: registry
      image: localhost/cascade-registry:dev
      env:
        - name: CASCADE_RAFT_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: CASCADE_OPERATOR_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CASCADE_OPERATOR_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: KUBECONFIG
          value: /etc/kubernetes/admin.conf
      volumeMounts:
        - mountPath: /etc/kubernetes/admin.conf
          name: kubeconfig
  hostNetwork: true
  volumes:
    - hostPath:
        path: /etc/kubernetes/admin.conf
      name: kubeconfig
