version: "2"
formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/robinkb/cascade
linters:
  exclusions:
    paths:
      - cluster/raft/qwal/example_test.go
      - cluster/raft/qwal/example_dump_test.go
    rules:
      - linters:
          - staticcheck
        # The raft library depends on this, so we can't change it.
        text: 'SA1019: "github.com/golang/protobuf/proto" is deprecated'
