name: Go

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  # Used by golangci-lint
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test ./... -timeout=60s
